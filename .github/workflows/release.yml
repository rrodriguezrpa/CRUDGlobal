name: Build & Release

# Genera el .exe autocontenido y lo publica como Release al empujar un tag vX.Y.Z
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish single-file exe
        shell: pwsh
        run: |
          dotnet publish src/Empleados.Desktop/Empleados.Desktop.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none `
            -o dist
          Compress-Archive -Path dist/Empleados.Desktop.exe -DestinationPath dist/EmpleadosApp-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EmpleadosApp-win-x64
          path: dist/Empleados.Desktop.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Empleados.Desktop.exe
            dist/EmpleadosApp-win-x64.zip
          body: |
            ## Gestion de Empleados (demo UiPath)
            App de escritorio + API REST en un solo ejecutable autocontenido.

            **Instalacion:** descarga `Empleados.Desktop.exe` y ejecutalo. No requiere instalar nada.
